x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "10"

services:
  postgres:
    ports: []
    restart: unless-stopped
    logging: *default-logging

  redis:
    ports: []
    restart: unless-stopped
    logging: *default-logging

  api:
    ports: []
    restart: unless-stopped
    logging: *default-logging

  worker:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME >/dev/null 2>&1 || pgrep -f 'celery.*worker' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging

  nginx:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/production/nginx/conf.d/default.active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/production/logs/nginx:/var/log/nginx
      - ./infra/production/certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - ./infra/production/certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
