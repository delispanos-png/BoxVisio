upstream cloudon_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name bi.boxvisio.com adminpanel.boxvisio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bi.boxvisio.com;

    ssl_certificate /etc/letsencrypt/live/bi.boxvisio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bi.boxvisio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location = / {
        return 302 /tenant/dashboard;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://cloudon_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name adminpanel.boxvisio.com;

    ssl_certificate /etc/letsencrypt/live/adminpanel.boxvisio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adminpanel.boxvisio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location = / {
        return 302 /admin/dashboard;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://cloudon_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
