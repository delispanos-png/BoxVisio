server {
    listen 80;
    listen [::]:80;
    server_name adminpanel.boxvisio.com;

    include /etc/nginx/conf.d/common_security.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://api_upstream/metrics;
    }

    location /api/ {
        include /etc/nginx/snippets/admin_allowlist.conf;
        rewrite ^/api/auth/(.*)$ /v1/auth/$1 break;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api_upstream;
    }

    location / {
        include /etc/nginx/snippets/admin_allowlist.conf;
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name adminpanel.boxvisio.com;

    include /etc/nginx/conf.d/common_security.conf;

    ssl_certificate /etc/letsencrypt/live/bi.boxvisio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bi.boxvisio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://api_upstream/metrics;
    }

    location /api/ {
        include /etc/nginx/snippets/admin_allowlist.conf;
        rewrite ^/api/auth/(.*)$ /v1/auth/$1 break;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api_upstream;
    }

    location / {
        include /etc/nginx/snippets/admin_allowlist.conf;
        proxy_pass http://frontend_upstream;
    }
}
