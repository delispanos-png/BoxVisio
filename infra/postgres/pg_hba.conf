# CloudOn BI hardened pg_hba.conf
# Order matters: first match wins.

# Local socket access
local   all             all                                     trust

# Loopback
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker bridge network (api/worker/nginx)
host    all             all             172.18.0.0/16           scram-sha-256

# Approved external administration IP
host    all             all             194.154.34.84/32        scram-sha-256

# Replication from localhost only
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256

# Explicit deny for any other external source
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
