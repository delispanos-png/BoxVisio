<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Ταμειακές Συναλλαγές">
  <defs>
    <linearGradient id="bgCash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="360" fill="url(#bgCash)"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#155e75">Ταμειακές Συναλλαγές</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="18" fill="#0e7490">Εκπαιδευτική ροή: Τύπος συναλλαγής -> Ροή -> Ρευστότητα</text>

  <rect x="40" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#67e8f9" stroke-width="2"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0e7490">1. Κατηγορίες</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εισπράξεις πελατών</text>
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Πληρωμές προμηθευτών</text>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εμβάσματα / Λογαριασμοί</text>

  <rect x="440" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#22d3ee" stroke-width="2"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0e7490">2. KPI Ροής</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Cash In</text>
  <text x="470" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Cash Out</text>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Net Cash</text>

  <rect x="840" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#06b6d4" stroke-width="2"/>
  <text x="870" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0e7490">3. Ενέργεια</text>
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Έλεγχος ανισορροπίας</text>
  <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Προτεραιοποίηση πληρωμών</text>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Σχέδιο ρευστότητας</text>

  <path d="M370 214 L430 214" stroke="#0e7490" stroke-width="4"/>
  <polygon points="430,214 418,206 418,222" fill="#0e7490"/>
  <path d="M770 214 L830 214" stroke="#0e7490" stroke-width="4"/>
  <polygon points="830,214 818,206 818,222" fill="#0e7490"/>
</svg>
