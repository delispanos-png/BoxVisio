<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Συμφωνίες Προμηθευτών">
  <defs>
    <linearGradient id="bgTargets" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="360" fill="url(#bgTargets)"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#4338ca">Συμφωνίες Προμηθευτών</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="18" fill="#4f46e5">Εκπαιδευτική ροή: Ορισμός όρων -> Επιλογή ειδών -> Εκτύπωση / Email</text>

  <rect x="40" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#4338ca">1. Όροι Συμφωνίας</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Έτος</text>
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Ποσό στόχου</text>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Επιστροφή % / ποσό</text>

  <rect x="440" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#818cf8" stroke-width="2"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#4338ca">2. Είδη Συμμετοχής</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Αναζήτηση ειδών</text>
  <text x="470" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Τσεκ επιλογές</text>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Προσθήκη στη λίστα</text>

  <rect x="840" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <text x="870" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#4338ca">3. Χρήση Συμφωνίας</text>
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Λεπτομέρειες / Πρόοδος</text>
  <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εκτύπωση σύνοψης</text>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Αποστολή email</text>

  <path d="M370 214 L430 214" stroke="#4338ca" stroke-width="4"/>
