<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Παραστατικά Αποθήκης">
  <defs>
    <linearGradient id="bgWh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="360" fill="url(#bgWh)"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#166534">Παραστατικά Αποθήκης</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="18" fill="#14532d">Εκπαιδευτική ροή: Κίνηση -> Απόθεμα -> Κάλυψη</text>

  <rect x="40" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">1. Κινήσεις</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εισαγωγές</text>
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εξαγωγές</text>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Μεταφορές</text>

  <rect x="440" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">2. Έλεγχος</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Αξία αποθέματος</text>
  <text x="470" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Ταχυκίνηση</text>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Παλαιότητα</text>

  <rect x="840" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="870" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">3. Απόφαση</text>
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Αναπλήρωση</text>
  <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Μείωση dead stock</text>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Μεταφορά αποθεμάτων</text>

  <path d="M370 214 L430 214" stroke="#15803d" stroke-width="4"/>
