<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Υπόλοιπα Πελατών">
  <defs>
    <linearGradient id="bgCustBal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="360" fill="url(#bgCustBal)"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#6d28d9">Υπόλοιπα Πελατών</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="18" fill="#7c3aed">Εκπαιδευτική ροή: Απαίτηση -> Overdue -> Εισπραξιμότητα</text>

  <rect x="40" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7c3aed">1. Απαιτήσεις</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Συνολικό υπόλοιπο</text>
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Ληξιπρόθεσμο υπόλοιπο</text>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Top εκτεθειμένοι πελάτες</text>

  <rect x="440" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#a78bfa" stroke-width="2"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7c3aed">2. Γήρανση</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">0-30 ημέρες</text>
  <text x="470" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">31-60 / 61-90</text>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">90+ ημέρες</text>

  <rect x="840" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="870" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7c3aed">3. Ενέργεια</text>
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Προτεραιότητα είσπραξης</text>
  <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Σχέδιο επικοινωνίας</text>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Μείωση καθυστερήσεων</text>

  <path d="M370 214 L430 214" stroke="#7c3aed" stroke-width="4"/>
  <polygon points="430,214 418,206 418,222" fill="#7c3aed"/>
  <path d="M770 214 L830 214" stroke="#7c3aed" stroke-width="4"/>
  <polygon points="830,214 818,206 818,222" fill="#7c3aed"/>
