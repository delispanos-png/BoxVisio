<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Υπόλοιπα Προμηθευτών">
  <defs>
    <linearGradient id="bgSupBal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="360" fill="url(#bgSupBal)"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#991b1b">Υπόλοιπα Προμηθευτών</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="18" fill="#b91c1c">Εκπαιδευτική ροή: Υποχρέωση -> Γήρανση -> Πλάνο πληρωμών</text>

  <rect x="40" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#fca5a5" stroke-width="2"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">1. Υπόλοιπο</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Open balance</text>
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Overdue balance</text>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Τάση περιόδου</text>

  <rect x="440" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#f87171" stroke-width="2"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">2. Γήρανση</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">0-30 ημέρες</text>
  <text x="470" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">31-60 / 61-90</text>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">90+ ημέρες</text>

  <rect x="840" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="870" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">3. Ενέργεια</text>
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Προτεραιότητα πληρωμής</text>
  <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Συμφωνία διακανονισμού</text>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Μείωση ρίσκου</text>

  <path d="M370 214 L430 214" stroke="#b91c1c" stroke-width="4"/>
  <polygon points="430,214 418,206 418,222" fill="#b91c1c"/>
  <path d="M770 214 L830 214" stroke="#b91c1c" stroke-width="4"/>
  <polygon points="830,214 818,206 818,222" fill="#b91c1c"/>
</svg>
