<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Παραστατικά Πωλήσεων">
  <defs>
    <linearGradient id="bgSales" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="360" fill="url(#bgSales)"/>
  <text x="40" y="54" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1e3a8a">Παραστατικά Πωλήσεων</text>
  <text x="40" y="88" font-family="Arial, sans-serif" font-size="18" fill="#334155">Εκπαιδευτική ροή: Φίλτρα -> Ανάλυση -> Απόφαση</text>

  <rect x="40" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="70" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">1. Φίλτρα</text>
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Ημερομηνία</text>
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Υποκατάστημα</text>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Πελάτης / Είδος</text>

  <rect x="440" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">2. Ανάλυση</text>
  <text x="470" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">KPI τζίρου</text>
  <text x="470" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Γράφημα τάσης</text>
  <text x="470" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Πίνακας γραμμών</text>

  <rect x="840" y="130" rx="16" ry="16" width="320" height="170" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="870" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">3. Απόφαση</text>
  <text x="870" y="200" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εστίαση σε πελάτες</text>
  <text x="870" y="225" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εστίαση σε κατηγορίες</text>
  <text x="870" y="250" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Εξαγωγή αναφοράς</text>

  <path d="M370 214 L430 214" stroke="#1d4ed8" stroke-width="4"/>
  <polygon points="430,214 418,206 418,222" fill="#1d4ed8"/>
  <path d="M770 214 L830 214" stroke="#1d4ed8" stroke-width="4"/>
  <polygon points="830,214 818,206 818,222" fill="#1d4ed8"/>
</svg>
